<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <div class="display">
            <!-- This shows the "work" (history) -->
            <div id="history" class="history"></div>
            <!-- This shows the current number/final answer -->
            <div id="result" class="result">0</div>
        </div>

        <div class="buttons">
            <button class="btn-clear span-two" onclick="clearAll()">AC</button>
            <button class="btn-delete" onclick="deleteLast()">DEL</button>
            <button class="btn-op" onclick="appendOperator('%')">%</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="btn-op" onclick="appendOperator('/')">/</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="btn-op" onclick="appendOperator('*')">×</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="btn-op" onclick="appendOperator('-')">-</button>

            <button onclick="appendNumber('.')">.</button>
            <button onclick="appendNumber('0')">0</button>
            <button class="btn-equals span-two" onclick="calculate()">=</button>
            <button class="btn-op" onclick="appendOperator('+')">+</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
